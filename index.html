<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0a08" />
  <title>GradTrack Aokbaab</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --black: #0b0a08;
      --white: #ffffff;
      --paper: #f4efe9;
      --blue: #40669f;
      --blue-light: #d8e3f3;
      --red: #921100;
      --gold: #dcae2b;
      --gray: #777777;
      --border: #bcb5ad;

      font-family: Inter, "Noto Sans Thai", Tahoma, sans-serif;
      color: #161616;
      background: #d7d7d7;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background: linear-gradient(135deg, #dedede, #b9b9b9);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    [hidden] {
      display: none !important;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 20px;
    }

    .phone-frame {
      position: relative;
      width: min(100%, 430px);
      min-height: 860px;
      overflow: hidden;
      background: var(--paper);
      border: 8px solid #111;
      border-radius: 42px;
      box-shadow: 0 24px 70px rgb(0 0 0 / 35%);
    }

    /* Header */

    .hero-header {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 27px 24px 22px;
      color: white;
      background: var(--black);
      border-bottom: 4px solid var(--blue);
    }

    .hero-header h1 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 27px;
      letter-spacing: 2px;
    }

    .eyebrow,
    .section-kicker {
      margin: 0;
      color: var(--gold);
      font-size: 9px;
      font-weight: 900;
      letter-spacing: 1.5px;
    }

    .subtitle {
      margin: 3px 0 0;
      color: #c9c9c9;
      font-size: 12px;
    }

    .sun-mark {
      position: relative;
      width: 41px;
      height: 32px;
      flex: none;
    }

    .sun-mark::before {
      content: "";
      position: absolute;
      top: 0;
      left: 9px;
      width: 20px;
      height: 20px;
      background: #f4bd20;
      border-radius: 50%;
    }

    .sun-mark::after {
      content: "";
      position: absolute;
      bottom: 0;
      width: 38px;
      height: 15px;
      background: white;
      border-radius: 20px;
    }

    .sun-mark span {
      position: absolute;
      bottom: 0;
      left: 2px;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
    }

    /* Profile */

    .profile-strip {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 14px 20px;
      background: white;
      border-bottom: 1px solid #c8c1b9;
    }

    .avatar {
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      color: white;
      font-weight: 900;
      background: var(--blue);
      border-radius: 50%;
    }

    .profile-copy {
      display: flex;
      flex: 1;
      flex-direction: column;
    }

    .profile-copy strong {
      font-size: 13px;
    }

    .profile-copy span {
      color: var(--gray);
      font-size: 10px;
    }

    .status-dot {
      display: grid;
      width: 27px;
      height: 27px;
      place-items: center;
      color: white;
      font-weight: 900;
      background: var(--black);
      border-radius: 50%;
    }

    /* Content */

    .content {
      height: 650px;
      padding: 18px 17px 105px;
      overflow-y: auto;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .paper-card,
    .feature-card,
    .metric-card,
    .course-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 0 rgb(0 0 0 / 12%);
    }

    .paper-card {
      padding: 16px;
      background: white;
    }

    .paper-card h2,
    .info-card h2 {
      margin: 3px 0 13px;
      font-family: Georgia, serif;
      font-size: 21px;
    }

    .dark-card {
      color: white;
      background: var(--black);
    }

    .feature-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px;
    }

    .feature-card p {
      max-width: 250px;
      color: #cacaca;
      font-size: 11px;
    }

    .big-number {
      margin: 7px 0;
      font-family: Georgia, serif;
      font-size: 54px;
      line-height: 1;
    }

    .award-icon {
      font-size: 48px;
    }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric-card {
      display: flex;
      flex-direction: column;
      padding: 16px;
      background: white;
    }

    .metric-card span {
      font-size: 11px;
    }

    .metric-card strong {
      font-family: Georgia, serif;
      font-size: 36px;
    }

    .metric-card small {
      color: #666;
      font-size: 9px;
    }

    .accent-card {
      color: white;
      background: var(--red);
      border-color: #6e0c00;
    }

    .accent-card small {
      color: #f2cbc4;
    }

    .card-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .card-heading > strong {
      font-family: Georgia, serif;
      font-size: 24px;
    }

    /* Progress */

    .progress-track {
      height: 8px;
      overflow: hidden;
      background: #dfdfdf;
      border: 1px solid #bcbcbc;
      border-radius: 20px;
    }

    .progress-fill {
      height: 100%;
      background: var(--blue);
    }

    .progress-fill.red {
      background: var(--red);
    }

    .progress-fill.gold {
      background: var(--gold);
    }

    .category-list {
      display: grid;
      gap: 14px;
    }

    .category-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 11px;
    }

    /* Buttons */

    .primary-button,
    .outline-button,
    .danger-button {
      padding: 12px 14px;
      border: 0;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 900;
    }

    .primary-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: white;
      background: var(--blue);
    }

    .outline-button {
      color: #161616;
      background: white;
      border: 1px solid #161616;
    }

    .danger-button {
      color: white;
      background: var(--red);
    }

    .paper-card > .outline-button,
    .paper-card > .danger-button {
      width: 100%;
      margin-top: 8px;
    }

    .toggle-grid,
    .select-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .choice {
      padding: 10px;
      text-align: left;
      background: #eee;
      border: 1px solid #aaa;
      border-radius: 8px;
      font-size: 10px;
    }

    .choice strong {
      display: block;
      margin-top: 3px;
    }

    .choice.active {
      color: white;
      background: var(--black);
      border-color: var(--black);
    }

    /* Form */

    .filter-card label,
    .modal label {
      display: grid;
      gap: 5px;
      font-size: 10px;
      font-weight: 800;
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: "⌄";
      position: absolute;
      top: 50%;
      right: 9px;
      pointer-events: none;
      transform: translateY(-55%);
    }

    .select-wrap select,
    .modal select,
    .modal input {
      width: 100%;
      padding: 9px 28px 9px 9px;
      color: #111;
      background: #f3f3f3;
      border: 1px solid #aaa;
      border-radius: 6px;
      appearance: none;
    }

    /* Courses */

    .course-list {
      display: grid;
      gap: 10px;
    }

    .course-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: white;
    }

    .grade-badge {
      display: grid;
      width: 38px;
      height: 49px;
      place-items: center;
      color: white;
      font-family: Georgia, serif;
      font-size: 18px;
      font-weight: 900;
      background: var(--black);
      border-radius: 7px;
    }

    .course-copy {
      min-width: 0;
      flex: 1;
    }

    .course-copy h3 {
      margin: 5px 0;
      overflow: hidden;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .course-copy p {
      margin: 0;
      color: var(--gray);
      font-size: 9px;
    }

    .course-code {
      padding: 3px 5px;
      color: #274c7c;
      font-size: 9px;
      font-weight: 900;
      background: var(--blue-light);
      border-radius: 4px;
    }

    .term {
      margin-left: 6px;
      color: var(--gray);
      font-size: 9px;
    }

    .row-actions {
      display: grid;
      gap: 4px;
    }

    .row-actions button,
    .modal-title button {
      padding: 4px;
      background: transparent;
      border: 0;
    }

    /* Chart */

    .chart {
      display: flex;
      height: 190px;
      align-items: flex-end;
      gap: 7px;
      padding: 20px 8px 0;
      border-bottom: 1px solid #999;
      border-left: 1px solid #999;
    }

    .bar-column {
      display: flex;
      height: 100%;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .bar-column span,
    .bar-column small {
      font-size: 8px;
    }

    .bar {
      width: 100%;
      min-height: 5px;
      background: var(--blue);
      border-radius: 5px 5px 0 0;
    }

    .semester-list {
      display: grid;
      gap: 8px;
    }

    .semester-list > div {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 3px;
      padding: 10px;
      background: #eee;
      border-radius: 7px;
      font-size: 10px;
    }

    .semester-list small {
      grid-column: 1 / -1;
      color: var(--gray);
    }

    .empty-state {
      padding: 24px;
      color: var(--gray);
      text-align: center;
      background: white;
      border: 1px dashed #aaa;
      border-radius: 12px;
      font-size: 12px;
    }

    .info-card {
      display: flex;
      gap: 15px;
      padding: 18px;
      border-radius: 12px;
    }

    .info-card p {
      color: #ccc;
      font-size: 10px;
    }

    /* Navigation */

    .bottom-nav {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 10px 12px 17px;
      background: var(--black);
      border-top: 3px solid var(--blue);
    }

    .bottom-nav button {
      display: grid;
      place-items: center;
      gap: 3px;
      color: #888;
      background: transparent;
      border: 0;
      font-size: 9px;
    }

    .bottom-nav button.active {
      color: white;
    }

    .nav-icon {
      display: grid;
      width: 31px;
      height: 31px;
      place-items: center;
      border-radius: 50%;
      font-size: 15px;
    }

    .bottom-nav button.active .nav-icon {
      background: var(--blue);
    }

    /* Modal */

    .modal-backdrop {
      position: absolute;
      z-index: 4;
      inset: 0;
      display: none;
      align-items: flex-end;
      padding: 14px;
      background: rgb(0 0 0 / 70%);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      display: grid;
      width: 100%;
      max-height: 92%;
      gap: 12px;
      padding: 18px;
      overflow-y: auto;
      background: white;
      border-top: 5px solid var(--blue);
      border-radius: 14px;
    }

    .modal-title {
      display: flex;
      justify-content: space-between;
    }

    .modal-title h2 {
      margin: 2px 0;
      font-family: Georgia, serif;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    @media (max-width: 460px) {
      .app-shell {
        padding: 0;
      }

      .phone-frame {
        width: 100%;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }

      .content {
        height: calc(100vh - 169px);
      }
    }
  </style>
</head>

        </form>
      </div>

    </div>
  </div>

      } catch {
        return structuredClone(INITIAL_COURSES);
      }
    }

    function saveCourses() {
      localStorage.setItem(
        "gradtrack_courses",
        JSON.stringify(courses)
      );
    }

    function calculateStats() {
      let earned = 0;
      let points = 0;
      let gpaCredits = 0;
      let hasF = false;

      const categoryCredits = {
        genEd: {
          total: 0,
          thai: 0,
          foreign: 0,
          science: 0,
          math: 0,
          social: 0,
          humanities: 0,
          otherGenEd: 0
        },

        core: 0,

        specific: {
          total: 0,
          compulsory: 0,
          elective: 0
        },

        freeElective: 0
      };

      for (const course of courses) {
        const gradeValue = GRADE_VALUES[course.grade];

        const passed = !["F", "W", "I"].includes(
          course.grade
        );

        if (course.grade === "F") {
          hasF = true;
        }

        if (gradeValue !== null) {
          gpaCredits += course.credits;
          points += gradeValue * course.credits;
        }

        if (!passed) {
          continue;
        }

        earned += course.credits;

        if (course.category === "genEd") {
          categoryCredits.genEd.total += course.credits;

          const subcategory =
            course.subcategory || "otherGenEd";

          categoryCredits.genEd[subcategory] =
            (categoryCredits.genEd[subcategory] || 0) +
            course.credits;
        }

        else if (course.category === "specific") {
          categoryCredits.specific.total += course.credits;

          const subcategory =
            course.subcategory || "compulsory";

          categoryCredits.specific[subcategory] =
            (categoryCredits.specific[subcategory] || 0) +
            course.credits;
        }

        else {
          categoryCredits[course.category] +=
            course.credits;
        }
      }

      const gpa = gpaCredits
        ? points / gpaCredits
        : 0;

      let honors =
        "ยังไม่เข้าเกณฑ์เกียรตินิยม";

      if (hasF) {
        honors =
          "ไม่ได้รับเกียรตินิยม เนื่องจากมีเกรด F";
      }

      else if (!graduatedInTime) {
        honors =
          "ไม่ได้รับเกียรตินิยม เนื่องจากจบเกินกำหนด";
      }

      else if (hasRegisteredRepeat) {
        honors =
          "ไม่ได้รับเกียรตินิยม เนื่องจากลงทะเบียนเรียนซ้ำ";
      }

      else if (gpa >= 3.75) {
        honors = earned >= CURRICULUM.total
          ? "เกียรตินิยมอันดับ 1"
          : "คาดว่าจะได้เกียรตินิยมอันดับ 1";
      }

      else if (gpa >= 3.25) {
        honors = earned >= CURRICULUM.total
          ? "เกียรตินิยมอันดับ 2"
          : "คาดว่าจะได้เกียรตินิยมอันดับ 2";
      }

      return {
        earned,
        remaining: Math.max(
          0,
          CURRICULUM.total - earned
        ),
        progress:
          (earned / CURRICULUM.total) * 100,
        gpa: gpa.toFixed(2),
        categoryCredits,
        honors
      };
    }

    function calculateSemesterStats() {
      const map = new Map();

      const semesterWeight = {
        "1": 1,
        "2": 2,
        Summer: 3
      };

      for (const course of courses) {
        const key =
          `${course.year}/${course.semester}`;

        const current = map.get(key) || {
          key,
          year: course.year,
          semester: course.semester,
          credits: 0,
          points: 0,
          gpaCredits: 0
        };

        const gradeValue =
          GRADE_VALUES[course.grade];

        if (gradeValue !== null) {
          current.points +=
            gradeValue * course.credits;

          current.gpaCredits +=
            course.credits;
        }

        if (!["F", "W", "I"].includes(course.grade)) {
          current.credits += course.credits;
        }

        map.set(key, current);
      }

      return [...map.values()]
        .map(item => ({
          ...item,

          gpa: item.gpaCredits
            ? item.points / item.gpaCredits
            : 0
        }))

        .sort((a, b) => {
          return (
            a.year - b.year ||
            semesterWeight[a.semester] -
            semesterWeight[b.semester]
          );
        });
    }

    function progress(value, tone = "blue") {
      const width = Math.min(
        100,
        Math.max(0, value)
      );

      return `
        <div class="progress-track">
          <div
            class="progress-fill ${tone}"
            style="width: ${width}%"
          ></div>
        </div>
      `;
    }

    function renderDashboard() {
      const stats = calculateStats();

      $("#dashboardTab").innerHTML = `
        <section class="feature-card dark-card">
          <div>
            <p class="section-kicker">
              CURRENT GPA
            </p>

            <div class="big-number">
              ${stats.gpa}
            </div>

            <p>${stats.honors}</p>
          </div>

          <div class="award-icon">🏆</div>
        </section>

        <div class="two-column">
          <section class="metric-card">
            <span>หน่วยกิตสะสม</span>
            <strong>${stats.earned}</strong>
            <small>
              จาก ${CURRICULUM.total} หน่วยกิต
            </small>
          </section>

          <section class="metric-card accent-card">
            <span>คงเหลือ</span>
            <strong>${stats.remaining}</strong>
            <small>หน่วยกิตก่อนจบ</small>
          </section>
        </div>

        <section class="paper-card">
          <div class="card-heading">
            <div>
              <p class="section-kicker">
                GRADUATION
              </p>

              <h2>ความคืบหน้าหลักสูตร</h2>
            </div>

            <strong>
              ${Math.round(stats.progress)}%
            </strong>
          </div>

          ${progress(stats.progress)}
        </section>

        <section class="paper-card">
          <div class="card-heading">
            <div>
              <p class="section-kicker">
                CURRICULUM
              </p>

              <h2>หน่วยกิตแยกตามหมวด</h2>
            </div>
          </div>

          <div class="category-list">
            ${
              Object.entries(
                CURRICULUM.categories
              )

              .map(([key, category]) => {
                const amount =
                  key === "genEd" ||
                  key === "specific"

                    ? stats.categoryCredits[key].total
                    : stats.categoryCredits[key];

                const tone =
                  key === "specific"
                    ? "red"

                    : key === "freeElective"
                      ? "gold"
                      : "blue";

                return `
                  <div class="category-row">
                    <div class="category-label">
                      <span>${category.name}</span>

                      <strong>
                        ${amount}/${category.required}
                      </strong>
                    </div>

                    ${progress(
                      amount /
                      category.required *
                      100,
                      tone
                    )}
                  </div>
                `;
              })

              .join("")
            }
          </div>
        </section>

        <section class="paper-card">
          <p class="section-kicker">
            HONOR CONDITIONS
          </p>

          <h2>เงื่อนไขเกียรตินิยม</h2>

          <div class="toggle-grid">
            <button
              id="graduatedToggle"
              class="choice ${
                graduatedInTime
                  ? "active"
                  : ""
              }"
            >
              จบภายใน 4 ปี

              <strong>
                ${
                  graduatedInTime
                    ? "ใช่"
                    : "ไม่ใช่"
                }
              </strong>
            </button>

            <button
              id="repeatToggle"
              class="choice ${
                !hasRegisteredRepeat
                  ? "active"
                  : ""
              }"
            >
              ไม่ลงเรียนซ้ำ

              <strong>
                ${
                  hasRegisteredRepeat
                    ? "ไม่ผ่าน"
                    : "ผ่าน"
                }
              </strong>
            </button>
          </div>
        </section>
      `;

      $("#graduatedToggle").onclick = () => {
        graduatedInTime = !graduatedInTime;
        renderAll();
      };

      $("#repeatToggle").onclick = () => {
        hasRegisteredRepeat =
          !hasRegisteredRepeat;

        renderAll();
      };
    }

    function renderCourses() {
      const filteredCourses = courses.filter(
        course => {
          const yearMatches =
            yearFilter === "all" ||
            course.year === Number(yearFilter);

          const semesterMatches =
            semesterFilter === "all" ||
            course.semester === semesterFilter;

          return (
            yearMatches &&
            semesterMatches
          );
        }
      );

      $("#coursesTab").innerHTML = `
        <section class="paper-card filter-card">
          <div>
            <p class="section-kicker">FILTER</p>
            <h2>ค้นหารายวิชา</h2>
          </div>

          <div class="select-grid">
            <label>
              ชั้นปี

              <div class="select-wrap">
                <select id="yearFilter">
                  <option value="all">
                    ทั้งหมด
                  </option>

                  ${
                    [1, 2, 3, 4, 5, 6, 7, 8]

                    .map(year => `
                      <option
                        value="${year}"
                        ${
                          String(year) === yearFilter
                            ? "selected"
                            : ""
                        }
                      >
                        ปี ${year}
                      </option>
                    `)

                    .join("")
                  }
                </select>
              </div>
            </label>

            <label>
              ภาคเรียน

              <div class="select-wrap">
                <select id="semesterFilter">
                  <option value="all">
                    ทั้งหมด
                  </option>

                  <option
                    value="1"
                    ${
                      semesterFilter === "1"
                        ? "selected"
                        : ""
                    }
                  >
                    เทอม 1
                  </option>

                  <option
                    value="2"
                    ${
                      semesterFilter === "2"
                        ? "selected"
                        : ""
                    }
                  >
                    เทอม 2
                  </option>

                  <option
                    value="Summer"
                    ${
                      semesterFilter === "Summer"
                        ? "selected"
                        : ""
                    }
                  >
                    Summer
                  </option>
                </select>
              </div>
            </label>
          </div>
        </section>

        <button
          id="addCourseButton"
          class="primary-button"
        >
          ＋ เพิ่มรายวิชาใหม่
        </button>

        <section class="course-list">
          ${
            filteredCourses.length

              ? filteredCourses
                .map(course => `
                  <article class="course-card">
                    <div class="grade-badge">
                      ${course.grade}
                    </div>

                    <div class="course-copy">
                      <div>
                        <span class="course-code">
                          ${course.code}
                        </span>

                        <span class="term">
                          ปี ${course.year}/${course.semester}
                        </span>
                      </div>

                      <h3>${course.name}</h3>

                      <p>
                        ${
                          CURRICULUM
                            .categories[
                              course.category
                            ]?.name ||
                          "ไม่ระบุ"
                        }

                        · ${course.credits} หน่วยกิต
                      </p>
                    </div>

                    <div class="row-actions">
                      <button
                        data-edit="${course.id}"
                        aria-label="แก้ไข"
                      >
                        ✎
                      </button>

                      <button
                        data-delete="${course.id}"
                        aria-label="ลบ"
                      >
                        🗑
                      </button>
                    </div>
                  </article>
                `)

                .join("")

              : `
                <div class="empty-state">
                  ไม่พบรายวิชาตามตัวกรอง
                </div>
              `
          }
        </section>
      `;

      $("#yearFilter").onchange = event => {
        yearFilter = event.target.value;
        renderCourses();
      };

      $("#semesterFilter").onchange = event => {
        semesterFilter = event.target.value;
        renderCourses();
      };

      $("#addCourseButton").onclick = () => {
        openModal();
      };

      document
        .querySelectorAll("[data-edit]")
        .forEach(button => {
          button.onclick = () => {
            const selectedCourse =
              courses.find(
                course =>
                  course.id ===
                  button.dataset.edit
              );

            openModal(selectedCourse);
          };
        });

      document
        .querySelectorAll("[data-delete]")
        .forEach(button => {
          button.onclick = () => {
            const confirmed = confirm(
              "คุณต้องการลบรายวิชานี้ใช่หรือไม่?"
            );

            if (!confirmed) {
              return;
            }

            courses = courses.filter(
              course =>
                course.id !==
                button.dataset.delete
            );

            saveCourses();
            renderAll();
          };
        });
    }

    function renderStats() {
      const items = calculateSemesterStats();

      $("#statsTab").innerHTML = `
        <section class="paper-card">
          <p class="section-kicker">
            SEMESTER GPA
          </p>

          <h2>แนวโน้มผลการเรียน</h2>

          ${
            items.length

              ? `
                <div class="chart">
                  ${
                    items.map(item => `
                      <div class="bar-column">
                        <span>
                          ${item.gpa.toFixed(2)}
                        </span>

                        <div
                          class="bar"
                          style="
                            height:
                            ${
                              Math.max(
                                5,
                                item.gpa / 4 * 100
                              )
                            }%
                          "
                        ></div>

                        <small>
                          ${item.year}/${item.semester}
                        </small>
                      </div>
                    `)

                    .join("")
                  }
                </div>
              `

              : `
                <div class="empty-state">
                  ยังไม่มีข้อมูลสำหรับสร้างกราฟ
                </div>
              `
          }
        </section>

        <section class="paper-card">
          <p class="section-kicker">
            DETAIL
          </p>

          <h2>ผลการเรียนรายภาค</h2>

          <div class="semester-list">
            ${
              items.map(item => `
                <div>
                  <span>
                    ปี ${item.year}
                    เทอม ${item.semester}
                  </span>

                  <strong>
                    GPA ${item.gpa.toFixed(2)}
                  </strong>

                  <small>
                    ${item.credits} หน่วยกิต
                  </small>
                </div>
              `)

              .join("")
            }
          </div>
        </section>
      `;
    }

    function renderSettings() {
      $("#settingsTab").innerHTML = `
        <section class="paper-card">
          <p class="section-kicker">
            DATA
          </p>

          <h2>จัดการข้อมูล</h2>

          <button
            id="resetData"
            class="outline-button"
          >
            รีเซ็ตข้อมูลตัวอย่าง
          </button>

          <button
            id="clearData"
            class="danger-button"
          >
            ลบรายวิชาทั้งหมด
          </button>
        </section>

        <section class="dark-card info-card">
          <div style="font-size: 42px">
            🎓
          </div>

          <div>
            <p class="section-kicker">
              ABOUT
            </p>

            <h2>GradTrack Aokbaab</h2>

            <p>
              ออกแบบด้วยระบบสี การ์ด
              Typography และ Component
              ตาม Design System ที่กำหนด
            </p>
          </div>
        </section>
      `;

      $("#resetData").onclick = () => {
        const confirmed = confirm(
          "รีเซ็ตข้อมูลทั้งหมดเป็นข้อมูลตัวอย่าง?"
        );

        if (!confirmed) {
          return;
        }

        courses =
          structuredClone(INITIAL_COURSES);

        saveCourses();
        renderAll();
      };

      $("#clearData").onclick = () => {
        const confirmed = confirm(
          "ลบรายวิชาทั้งหมด?"
        );

        if (!confirmed) {
          return;
        }

        courses = [];
        saveCourses();
        renderAll();
      };
    }

    function setupFormOptions() {
      $("#formGrade").innerHTML =
        Object.keys(GRADE_VALUES)

        .map(grade => `
          <option value="${grade}">
            ${grade}
          </option>
        `)

        .join("");

      $("#formYear").innerHTML =
        [1, 2, 3, 4, 5, 6, 7, 8]

        .map(year => `
          <option value="${year}">
            ${year}
          </option>
        `)

        .join("");

      $("#formCategory").innerHTML =
        Object.entries(
          CURRICULUM.categories
        )

        .map(([key, category]) => `
          <option value="${key}">
            ${category.name}
          </option>
        `)

        .join("");

      updateSubcategoryOptions();
    }

    function updateSubcategoryOptions() {
      const category =
        $("#formCategory").value;

      const wrapper =
        $("#subcategoryWrap");

      const select =
        $("#formSubcategory");

      const subcategories =
        CURRICULUM
          .categories[category]
          ?.subcategories;

      if (!subcategories) {
        wrapper.hidden = true;
        select.innerHTML = "";
        return;
      }

      wrapper.hidden = false;

      select.innerHTML =
        Object.entries(subcategories)

        .map(([key, subcategory]) => `
          <option value="${key}">
            ${subcategory.name}
          </option>
        `)

        .join("");
    }

    function openModal(course = null) {
      editingId = course?.id || null;

      $("#modalHeading").textContent =
        editingId
          ? "แก้ไขรายวิชา"
          : "เพิ่มรายวิชา";

      $("#formCode").value =
        course?.code || "";

      $("#formName").value =
        course?.name || "";

      $("#formCredits").value =
        course?.credits || 3;

      $("#formGrade").value =
        course?.grade || "A";

      $("#formYear").value =
        course?.year || 1;

      $("#formSemester").value =
        course?.semester || "1";

      $("#formCategory").value =
        course?.category || "genEd";

      updateSubcategoryOptions();

      if (!$("#subcategoryWrap").hidden) {
        $("#formSubcategory").value =
          course?.subcategory ||
          (
            $("#formCategory").value === "genEd"
              ? "thai"
              : "compulsory"
          );
      }

      $("#courseModal").classList.add("open");
    }

    function closeModal() {
      $("#courseModal").classList.remove("open");
    }

    function renderAll() {
      renderDashboard();
      renderCourses();
      renderStats();
      renderSettings();
    }

    setupFormOptions();
    renderAll();

    document
      .querySelectorAll(".bottom-nav button")
      .forEach(button => {
        button.onclick = () => {
          document
            .querySelectorAll(
              ".bottom-nav button"
            )

            .forEach(item => {
              item.classList.remove("active");
            });

          button.classList.add("active");

          [
            "dashboardTab",
            "coursesTab",
            "statsTab",
            "settingsTab"
          ]

          .forEach(id => {
            document.getElementById(id).hidden =
              id !== button.dataset.tab;
          });
        };
      });

    $("#formCategory").onchange =
      updateSubcategoryOptions;

    $("#closeModal").onclick =
      closeModal;

    $("#cancelModal").onclick =
      closeModal;

    $("#courseModal").onclick = event => {
      if (event.target === $("#courseModal")) {
        closeModal();
      }
    };

    $("#courseForm").onsubmit = event => {
      event.preventDefault();

      const category =
        $("#formCategory").value;

      const course = {
        id:
          editingId ||
          String(Date.now()),

        code:
          $("#formCode")
            .value
            .trim()
            .toUpperCase(),

        name:
          $("#formName")
            .value
            .trim(),

        credits:
          Number(
            $("#formCredits").value
          ),

        grade:
          $("#formGrade").value,

        category,

        subcategory:
          $("#subcategoryWrap").hidden
            ? ""
            : $("#formSubcategory").value,

        year:
          Number(
            $("#formYear").value
          ),

        semester:
          $("#formSemester").value
      };

      if (!course.code || !course.name) {
        return;
      }

      if (editingId) {
        courses = courses.map(item => {
          return item.id === editingId
            ? course
            : item;
        });
      }

      else {
        courses.push(course);
      }

      saveCourses();
      closeModal();
      renderAll();
    };
  </script>
</body>
</html>
