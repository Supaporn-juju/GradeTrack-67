<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0b0b0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />
  <meta name="apple-mobile-web-app-title" content="GradTrack" />

  <title>GradTrack — Supaporn Kriangkraiwanich</title>

  <style>
    :root {
      --blue: #40669f;
      --cream: #f4efe9;
      --red: #921100;
      --black: #0b0b0b;
      --dark: #333333;
      --gray: #666666;
      --light-gray: #cccccc;
      --background: #f5f5f5;
      --surface: #ffffff;
      --border: #e5e5e5;
      --success: #247a4a;
      --warning: #ad6b00;
      --danger: #a52016;

      --card-radius: 16px;
      --control-radius: 10px;
      --card-shadow: 0 6px 14px rgba(0, 0, 0, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      color: var(--dark);
      background: #d8d8d8;
      font-family: Arial, "Noto Sans Thai", Tahoma, sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    [hidden] {
      display: none !important;
    }

    .app {
      position: relative;
      width: min(100%, 460px);
      min-height: 100vh;
      margin: auto;
      overflow: hidden;
      background: var(--background);
      box-shadow: 0 0 46px rgba(0, 0, 0, 0.2);
    }

    /* =========================
       HEADER
    ========================= */

    .masthead {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 22px 20px 18px;
      color: white;
      background: var(--black);
      border-bottom: 4px solid var(--blue);
    }

    .weather-mark {
      position: relative;
      width: 42px;
      height: 32px;
      flex: none;
    }

    .weather-mark .sun {
      position: absolute;
      top: 0;
      left: 8px;
      width: 19px;
      height: 19px;
      background: #f2bd19;
      border-radius: 50%;
    }

    .weather-mark .cloud-a,
    .weather-mark .cloud-b {
      position: absolute;
      bottom: 0;
      background: white;
      border-radius: 20px;
    }

    .weather-mark .cloud-a {
      left: 0;
      width: 38px;
      height: 14px;
    }

    .weather-mark .cloud-b {
      left: 4px;
      width: 21px;
      height: 21px;
    }

    .masthead h1 {
      margin: 0;
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 27px;
      line-height: 1;
      letter-spacing: 1px;
    }

    .masthead p {
      margin: 6px 0 0;
      color: #f2bd19;
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.8px;
    }

    /* =========================
       PROFILE
    ========================= */

    .profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .avatar {
      display: grid;
      width: 42px;
      height: 42px;
      flex: none;
      place-items: center;
      color: white;
      font-size: 18px;
      font-weight: 800;
      background: var(--blue);
      border-radius: 50%;
    }

    .profile-copy {
      min-width: 0;
      flex: 1;
    }

    .profile-copy strong {
      display: block;
      overflow: hidden;
      font-size: 14px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-copy span {
      display: block;
      margin-top: 3px;
      color: var(--gray);
      font-size: 11px;
    }

    .profile-status {
      padding: 7px 10px;
      color: white;
      font-size: 10px;
      font-weight: 800;
      background: var(--black);
      border: 0;
      border-radius: 999px;
    }

    /* =========================
       MAIN
    ========================= */

    main {
      min-height: calc(100vh - 146px);
      padding: 20px 16px 112px;
    }

    .tab {
      display: grid;
      gap: 16px;
    }

    .kicker {
      margin: 0;
      color: var(--red);
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.8px;
    }

    h2 {
      margin: 4px 0 14px;
      color: var(--black);
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 24px;
      line-height: 1.1;
    }

    h3 {
      margin: 0;
      color: var(--black);
    }

    .card {
      padding: 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
    }

    .card.dark {
      color: white;
      background: var(--black);
      border-color: #222222;
    }

    .card.dark h2 {
      color: white;
    }

    .card.dark .kicker {
      color: #f2bd19;
    }

    /* =========================
       DASHBOARD
    ========================= */

    .hero-card {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .gpa {
      margin-top: 4px;
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
    }

    .hero-note {
      margin: 8px 0 0;
      color: #d0d0d0;
      font-size: 11px;
      line-height: 1.5;
    }

    .hero-icon {
      font-size: 43px;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric {
      display: flex;
      min-height: 136px;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric span {
      color: var(--gray);
      font-size: 11px;
    }

    .metric strong {
      color: var(--black);
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 40px;
    }

    .metric small {
      color: var(--gray);
      font-size: 10px;
    }

    .metric.red {
      background: var(--red);
      border-color: #711000;
    }

    .metric.red span,
    .metric.red strong,
    .metric.red small {
      color: white;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .big-label {
      color: var(--blue);
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 27px;
      font-weight: 800;
    }

    /* =========================
       PROGRESS
    ========================= */

    .progress {
      height: 10px;
      overflow: hidden;
      background: #ececec;
      border: 1px solid #d4d4d4;
      border-radius: 999px;
    }

    .progress span {
      display: block;
      width: 0;
      height: 100%;
      background: var(--blue);
      border-radius: inherit;
      transition: width 0.25s ease;
    }

    .progress.red span {
      background: var(--red);
    }

    .progress.gold span {
      background: #d0a522;
    }

    .progress.green span {
      background: var(--success);
    }

    /* =========================
       STATUS
    ========================= */

    .status-box {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      background: #eef2f8;
      border: 1px solid #c9d6e8;
      border-radius: 12px;
    }

    .status-box.warning {
      background: #fff2da;
      border-color: #efd19a;
    }

    .status-box.danger {
      background: #fbe4e1;
      border-color: #edb8b1;
    }

    .status-symbol {
      font-size: 28px;
    }

    .status-copy strong {
      display: block;
      color: var(--black);
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 19px;
    }

    .status-copy p {
      margin: 5px 0 0;
      color: var(--gray);
      font-size: 11px;
      line-height: 1.5;
    }

    /* =========================
       HONORS
    ========================= */

    .honor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .honor-card {
      padding: 13px;
      background: #f1f1f1;
      border: 1px solid #dddddd;
      border-radius: 12px;
    }

    .honor-card.eligible {
      background: #fff4cc;
      border-color: #e4c25e;
    }

    .honor-card strong {
      display: block;
      color: var(--black);
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 15px;
    }

    .honor-card span {
      display: block;
      margin-top: 5px;
      color: var(--gray);
      font-size: 10px;
    }

    /* =========================
       TREND
    ========================= */

    .trend-wrap {
      display: grid;
      grid-template-columns: 95px 1fr;
      align-items: center;
      gap: 14px;
    }

    .trend-badge {
      display: grid;
      height: 95px;
      place-items: center;
      color: white;
      text-align: center;
      background: var(--black);
      border-radius: 14px;
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 14px;
      font-weight: 800;
    }

    .trend-copy h3 {
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 18px;
    }

    .trend-copy p {
      margin: 6px 0 0;
      color: var(--gray);
      font-size: 11px;
      line-height: 1.5;
    }

    /* =========================
       FORMS
    ========================= */

    .filter-grid,
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      padding: 11px 12px;
      color: var(--black);
      background: #f0f0f0;
      border: 1px solid #d6d6d6;
      border-radius: var(--control-radius);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(64, 102, 159, 0.14);
    }

    .checkbox-line {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 11px;
      font-weight: 700;
    }

    .checkbox-line input {
      width: auto;
    }

    /* =========================
       BUTTONS
    ========================= */

    .btn {
      padding: 12px 14px;
      font-weight: 800;
      border: 0;
      border-radius: 9px;
      transition: 0.2s ease;
    }

    .btn.primary {
      color: white;
      background: var(--blue);
    }

    .btn.secondary {
      color: var(--black);
      background: #e5e5e5;
    }

    .btn.danger {
      color: white;
      background: var(--red);
    }

    .btn.full {
      width: 100%;
    }

    /* =========================
       COURSES
    ========================= */

    .course-list {
      display: grid;
      gap: 12px;
    }

    .course {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .grade {
      display: grid;
      width: 42px;
      height: 54px;
      flex: none;
      place-items: center;
      color: white;
      background: var(--black);
      border-radius: 9px;
      font-family: "Comic Sans MS", "Segoe Print", cursive;
      font-size: 20px;
      font-weight: 800;
    }

    .course-info {
      min-width: 0;
      flex: 1;
    }

    .course-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }

    .course-code {
      padding: 3px 7px;
      color: #2e568a;
      font-size: 10px;
      font-weight: 800;
      background: #dce7f6;
      border-radius: 6px;
    }

    .course-term {
      color: var(--gray);
      font-size: 10px;
    }

    .course h3 {
      overflow: hidden;
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .course p {
      margin: 5px 0 0;
      color: var(--gray);
      font-size: 10px;
    }

    .actions {
      display: grid;
      gap: 5px;
    }

    .icon-btn {
      display: grid;
      width: 31px;
      height: 31px;
      place-items: center;
      color: var(--black);
      background: #ededed;
      border: 0;
      border-radius: 50%;
    }

    .icon-btn.delete:hover {
      color: var(--red);
      background: #f6d8d2;
    }

    /* =========================
       TERM GPA
    ========================= */

    .chart {
      display: flex;
      height: 220px;
      align-items: flex-end;
      gap: 6px;
      padding: 18px 8px 0;
      overflow-x: auto;
      border-bottom: 1px solid #aaaaaa;
      border-left: 1px solid #aaaaaa;
    }

    .bar-col {
      display: flex;
      min-width: 25px;
      height: 100%;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
    }

    .bar-col span,
    .bar-col small {
      font-size: 8px;
    }

    .bar {
      width: 100%;
      min-height: 5px;
      background: var(--blue);
      border-radius: 5px 5px 0 0;
    }

    .term-summary {
      display: grid;
      gap: 10px;
    }

    .term-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px;
      padding: 11px;
      background: #ededed;
      border-radius: 9px;
      font-size: 11px;
    }

    .term-item small {
      grid-column: 1 / -1;
      color: var(--gray);
    }

    /* =========================
       CHECKLIST
    ========================= */

    .checklist {
      display: grid;
      gap: 9px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px;
      background: #efefef;
      border: 1px solid #dddddd;
      border-radius: 10px;
      font-size: 11px;
    }

    .check-icon {
      display: grid;
      width: 24px;
      height: 24px;
      flex: none;
      place-items: center;
      color: white;
      font-weight: 900;
      background: #cccccc;
      border-radius: 50%;
    }

    .check-item.done {
      background: #e4f2e9;
      border-color: #bdddc8;
    }

    .check-item.done .check-icon {
      background: var(--success);
    }

    .check-copy {
      flex: 1;
    }

    .check-copy strong {
      display: block;
      color: var(--black);
    }

    .check-copy small {
      display: block;
      margin-top: 3px;
      color: var(--gray);
    }

    /* =========================
       SETTINGS
    ========================= */

    .settings-stack {
      display: grid;
      gap: 10px;
    }

    .helper {
      margin: 0;
      color: var(--gray);
      font-size: 10px;
      line-height: 1.5;
    }

    .empty {
      padding: 28px 16px;
      color: var(--gray);
      text-align: center;
      background: white;
      border: 1px dashed #c8c8c8;
      border-radius: 14px;
      font-size: 12px;
    }

    /* =========================
       NAVIGATION
    ========================= */

    .bottom-nav {
      position: fixed;
      z-index: 20;
      bottom: 0;
      left: 50%;
      display: grid;
      width: min(100%, 460px);
      grid-template-columns: repeat(5, 1fr);
      padding: 9px 8px 14px;
      background: var(--black);
      border-top: 3px solid var(--blue);
      transform: translateX(-50%);
    }

    .nav-btn {
      display: grid;
      justify-items: center;
      gap: 4px;
      color: #8b8b8b;
      background: transparent;
      border: 0;
      font-size: 9px;
    }

    .nav-icon {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 50%;
      font-size: 15px;
    }

    .nav-btn.active {
      color: white;
    }

    .nav-btn.active .nav-icon {
      background: var(--blue);
    }

    /* =========================
       MODAL
    ========================= */

    .modal-backdrop {
      position: fixed;
      z-index: 50;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
      background: rgba(0, 0, 0, 0.68);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      display: grid;
      width: min(100%, 430px);
      max-height: 92vh;
      gap: 12px;
      padding: 18px;
      overflow: auto;
      background: white;
      border-top: 5px solid var(--blue);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .modal-head h2 {
      margin-bottom: 0;
    }

    .close {
      width: 34px;
      height: 34px;
      background: #ececec;
      border: 0;
      border-radius: 50%;
      font-size: 18px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 4px;
    }

    @media (min-width: 461px) {
      .app {
        min-height: 900px;
        margin: 18px auto;
        border-radius: 26px;
      }

      .bottom-nav {
        bottom: 18px;
        border-radius: 0 0 26px 26px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="masthead">
      <div class="weather-mark" aria-hidden="true">
        <span class="sun"></span>
        <span class="cloud-a"></span>
        <span class="cloud-b"></span>
      </div>

      <div>
        <h1>GRADTRACK</h1>
        <p>STUDY GUIDE</p>
      </div>
    </header>

    <section class="profile">
      <div id="avatar" class="avatar">S</div>

      <div class="profile-copy">
        <strong id="profileName">
          Supaporn Kriangkraiwanich
        </strong>

        <span id="profileId">
          6710302005 · Digital Design & Technology
        </span>
      </div>

      <button id="quickEditProfile" class="profile-status">
        แก้ไข
      </button>
    </section>

    <main>
      <section id="dashboardTab" class="tab"></section>
      <section id="coursesTab" class="tab" hidden></section>
      <section id="termsTab" class="tab" hidden></section>
      <section id="checklistTab" class="tab" hidden></section>
      <section id="settingsTab" class="tab" hidden></section>
    </main>

    <nav class="bottom-nav" aria-label="เมนูหลัก">
      <button class="nav-btn active" data-tab="dashboardTab">
        <span class="nav-icon">⌂</span>
        <span>ภาพรวม</span>
      </button>

      <button class="nav-btn" data-tab="coursesTab">
        <span class="nav-icon">▤</span>
        <span>รายวิชา</span>
      </button>

      <button class="nav-btn" data-tab="termsTab">
        <span class="nav-icon">▥</span>
        <span>รายเทอม</span>
      </button>

      <button class="nav-btn" data-tab="checklistTab">
        <span class="nav-icon">✓</span>
        <span>เช็กลิสต์</span>
      </button>

      <button class="nav-btn" data-tab="settingsTab">
        <span class="nav-icon">⚙</span>
        <span>ตั้งค่า</span>
      </button>
    </nav>
  </div>

  <!-- COURSE MODAL -->

  <div id="courseModal" class="modal-backdrop">
    <form id="courseForm" class="modal">
      <div class="modal-head">
        <div>
          <p class="kicker">COURSE FORM</p>
          <h2 id="courseModalTitle">เพิ่มรายวิชา</h2>
        </div>

        <button
          class="close"
          id="closeCourseModal"
          type="button"
        >
          ×
        </button>
      </div>

      <label>
        รหัสวิชา
        <input id="formCode" required />
      </label>

      <label>
        ชื่อวิชา
        <input id="formName" required />
      </label>

      <div class="form-grid">
        <label>
          หน่วยกิต

          <select id="formCredits">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="6">6</option>
          </select>
        </label>

        <label>
          เกรด
          <select id="formGrade"></select>
        </label>
      </div>

      <div class="form-grid">
        <label>
          ชั้นปี
          <select id="formYear"></select>
        </label>

        <label>
          ภาคเรียน

          <select id="formSemester">
            <option value="1">เทอม 1</option>
            <option value="2">เทอม 2</option>
            <option value="3">เทอม 3</option>
          </select>
        </label>
      </div>

      <label>
        หมวดวิชา
        <select id="formCategory"></select>
      </label>

      <label id="subcategoryWrap">
        กลุ่มวิชาย่อย
        <select id="formSubcategory"></select>
      </label>

      <label class="checkbox-line">
        <input id="formRepeated" type="checkbox" />
        รายวิชานี้เป็นการลงทะเบียนเรียนซ้ำ
      </label>

      <div class="modal-actions">
        <button
          id="cancelCourseModal"
          class="btn secondary"
          type="button"
        >
          ยกเลิก
        </button>

        <button class="btn primary" type="submit">
          บันทึก
        </button>
      </div>
    </form>

    const GRADE_VALUES = {
      A: 4,
      "B+": 3.5,
      B: 3,
      "C+": 2.5,
      C: 2,
      "D+": 1.5,
      D: 1,
      F: 0,
      W: null,
      I: null
    };

    /* =========================
       STATE
    ========================= */

    let profile = loadData(
      "gradtrack_profile",
      INITIAL_PROFILE
    );

    let settings = loadData(
      "gradtrack_settings",
      DEFAULT_SETTINGS
    );

    let courses = loadData(
      "gradtrack_courses_v2",
      INITIAL_COURSES
    );

    let editingId = null;
    let yearFilter = "all";
    let semesterFilter = "all";

    const $ = selector =>
      document.querySelector(selector);

    /* =========================
       STORAGE
    ========================= */

    function cloneData(data) {
      return JSON.parse(
        JSON.stringify(data)
      );
    }

    function loadData(key, fallback) {
      try {
        const saved =
          localStorage.getItem(key);

        return saved
          ? JSON.parse(saved)
          : cloneData(fallback);
      } catch {
        return cloneData(fallback);
      }
    }

    function saveData() {
      localStorage.setItem(
        "gradtrack_profile",
        JSON.stringify(profile)
      );

      localStorage.setItem(
        "gradtrack_settings",
        JSON.stringify(settings)
      );

      localStorage.setItem(
        "gradtrack_courses_v2",
        JSON.stringify(courses)
      );
    }

    /* =========================
       CALCULATIONS
    ========================= */

    function isPassed(course) {
      return !["F", "W", "I"].includes(
        course.grade
      );
    }

    function calculateAllStats() {
      let earnedCredits = 0;
      let totalPoints = 0;
      let gpaCredits = 0;

      let hasF = false;
      let hasRepeatedCourse = false;

      const categoryCredits = {
        genEd: {
          total: 0,
          thai: 0,
          foreign: 0,
          science: 0,
          math: 0,
          social: 0,
          humanities: 0,
          otherGenEd: 0
        },

        core: 0,

        specific: {
          total: 0,
          compulsory: 0,
          elective: 0
        },

        freeElective: 0
      };

      courses.forEach(course => {
        const gradeValue =
          GRADE_VALUES[course.grade];

        if (course.grade === "F") {
          hasF = true;
        }

        if (course.repeated) {
          hasRepeatedCourse = true;
        }

        if (gradeValue !== null) {
          totalPoints +=
            gradeValue * course.credits;

          gpaCredits += course.credits;
        }

        if (!isPassed(course)) {
          return;
        }

        earnedCredits += course.credits;

        if (course.category === "genEd") {
          categoryCredits.genEd.total +=
            course.credits;

          const subcategory =
            course.subcategory ||
            "otherGenEd";

          categoryCredits.genEd[
            subcategory
          ] += course.credits;
        }

        else if (
          course.category === "specific"
        ) {
          categoryCredits.specific.total +=
            course.credits;

          const subcategory =
            course.subcategory ||
            "compulsory";

          categoryCredits.specific[
            subcategory
          ] += course.credits;
        }

        else {
          categoryCredits[
            course.category
          ] += course.credits;
        }
      });

      const cumulativeGpa =
        gpaCredits > 0
          ? totalPoints / gpaCredits
          : 0;

      let studentStatus;

      if (
        cumulativeGpa >=
        settings.normalMinGpa
      ) {
        studentStatus = {
          label: "สถานภาพปกติ",
          tone: "normal",
          icon: "✓",

          detail:
            `GPA รวม ${cumulativeGpa.toFixed(2)} ` +
            "อยู่ในเกณฑ์ปกติ"
        };
      }

      else if (
        cumulativeGpa >=
        settings.probationMinGpa
      ) {
        studentStatus = {
          label:
            "วิทยาทัณฑ์ (Probation)",

          tone: "warning",
          icon: "!",

          detail:
            `GPA รวม ${cumulativeGpa.toFixed(2)} ` +
            `ต่ำกว่า ${settings.normalMinGpa.toFixed(2)}`
        };
      }

      else {
        studentStatus = {
          label: "พ้นสภาพ",
          tone: "danger",
          icon: "×",

          detail:
            `GPA รวม ${cumulativeGpa.toFixed(2)} ` +
            `ต่ำกว่า ${settings.probationMinGpa.toFixed(2)}`
        };
      }

      const honorBaseEligible =
        earnedCredits >=
          settings.totalCredits &&

        (
          !settings.requireNoFForHonors ||
          !hasF
        ) &&

        (
          !settings.requireNoRepeatForHonors ||
          !hasRepeatedCourse
        );

      const honor1Eligible =
        honorBaseEligible &&
        cumulativeGpa >=
          settings.honor1Gpa;

      const honor2Eligible =
        honorBaseEligible &&
        cumulativeGpa >=
          settings.honor2Gpa &&
        cumulativeGpa <
          settings.honor1Gpa;

      return {
        earnedCredits,

        remainingCredits:
          Math.max(
            0,
            settings.totalCredits -
              earnedCredits
          ),

        progress:
          settings.totalCredits > 0
            ? (
              earnedCredits /
              settings.totalCredits
            ) * 100
            : 0,

        cumulativeGpa,
        categoryCredits,

        hasF,
        hasRepeatedCourse,

        studentStatus,

        honorBaseEligible,
        honor1Eligible,
        honor2Eligible
      };
    }

    function calculateTermStats() {
      const rows = [];

      for (
        let year = 1;
        year <= 4;
        year += 1
      ) {
        for (
          let semester = 1;
          semester <= 3;
          semester += 1
        ) {
          const termCourses =
            courses.filter(course => {
              return (
                course.year === year &&
                String(course.semester) ===
                  String(semester)
              );
            });

          let points = 0;
          let gpaCredits = 0;
          let earnedCredits = 0;

          termCourses.forEach(course => {
            const gradeValue =
              GRADE_VALUES[course.grade];

            if (gradeValue !== null) {
              points +=
                gradeValue *
                course.credits;

              gpaCredits +=
                course.credits;
            }

            if (isPassed(course)) {
              earnedCredits +=
                course.credits;
            }
          });

          rows.push({
            year,
            semester,

            courseCount:
              termCourses.length,

            earnedCredits,

            gpa:
              gpaCredits > 0
                ? points / gpaCredits
                : 0
          });
        }
      }

      return rows;
    }

    function calculateTrend() {
      const activeTerms =
        calculateTermStats().filter(
          term =>
            term.courseCount > 0
        );

      if (activeTerms.length < 2) {
        return {
          label: "ข้อมูลยังไม่พอ",
          icon: "—",

          detail:
            "เพิ่มผลการเรียนอย่างน้อย 2 เทอม " +
            "เพื่อดูแนวโน้ม"
        };
      }

      const latest =
        activeTerms[
          activeTerms.length - 1
        ];

      const previous =
        activeTerms[
          activeTerms.length - 2
        ];

      const difference =
        latest.gpa - previous.gpa;

      if (difference > 0.15) {
        return {
          label: "แนวโน้มดีขึ้น",
          icon: "↗",

          detail:
            "GPA เทอมล่าสุดเพิ่มขึ้น " +
            `${difference.toFixed(2)} ` +
            "จากเทอมก่อน"
        };
      }

      if (difference < -0.15) {
        return {
          label: "ควรเฝ้าระวัง",
          icon: "↘",

          detail:
            "GPA เทอมล่าสุดลดลง " +
            `${Math.abs(
              difference
            ).toFixed(2)} ` +
            "จากเทอมก่อน"
        };
      }

      return {
        label: "แนวโน้มคงที่",
        icon: "→",

        detail:
          "GPA เทอมล่าสุดใกล้เคียง" +
          "กับเทอมก่อน"
      };
    }

    function progressBar(
      value,
      tone = ""

      const width = Math.min(
        100,
        Math.max(0, value)
      );

      return `
        <div class="progress ${tone}">
          <span style="width: ${width}%"></span>
        </div>
      `;
    }

    function renderChecklist() {
      const stats =
        calculateAllStats();

      const checks = [];

      Object.entries(
        CURRICULUM
      ).forEach(([key, category]) => {
        const amount =
          key === "genEd" ||
          key === "specific"

            ? stats.categoryCredits[
                key
              ].total

            : stats.categoryCredits[
                key
              ];

        checks.push({
          done:
            amount >=
            category.required,

          title:
            category.name,

          detail:
            `${amount}/` +
            `${category.required} ` +
            "หน่วยกิต"
        });

        if (category.subcategories) {
          Object.entries(
            category.subcategories
          ).forEach(
            ([subcategoryKey, subcategory]) => {
              const subcategoryAmount =
                stats.categoryCredits[
                  key
                ][subcategoryKey] || 0;

              checks.push({
                done:
                  subcategoryAmount >=
                  subcategory.required,

                title:
                  `${category.name} — ` +
                  subcategory.name,

                detail:
                  `${subcategoryAmount}/` +
                  `${subcategory.required} ` +
                  "หน่วยกิต"
              });
            }
          );
        }
      });

      $("#checklistTab").innerHTML = `
        <section class="card">
          <p class="kicker">
            AUTO CHECKLIST
          </p>

          <h2>
            ตรวจความครบถ้วนหลักสูตร
          </h2>

          <div class="checklist">
            ${
              checks.map(item => `
                <div class="
                  check-item
                  ${item.done ? "done" : ""}
                ">
                  <div class="check-icon">
                    ${item.done ? "✓" : "·"}

                  <div class="check-copy">

                    <small>
                      ${item.detail}

                  </div>
                </div>
              `).join("")

          </div>
        </section>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function setupCourseForm() {
      $("#formGrade").innerHTML =
        Object.keys(GRADE_VALUES)
          .map(grade => `
            <option value="${grade}">
              ${grade}
            </option>
          `)
          .join("");

      $("#formYear").innerHTML =
        [1, 2, 3, 4]
          .map(year => `
            <option value="${year}">
              ปี ${year}
            </option>
          `)
          .join("");

      $("#formCategory").innerHTML =
        Object.entries(CURRICULUM)
          .map(([key, category]) => `
            <option value="${key}">
              ${category.name}
            </option>
          `)
          .join("");

      updateSubcategories();
    }

    function updateSubcategories() {
      const categoryKey =
        $("#formCategory").value;

      const subcategories =
        CURRICULUM[
          categoryKey
        ]?.subcategories;

      if (!subcategories) {
        $("#subcategoryWrap").hidden =
          true;

        $("#formSubcategory").innerHTML =
          "";

        return;
      }

      $("#subcategoryWrap").hidden =
        false;

      $("#formSubcategory").innerHTML =
        Object.entries(subcategories)
          .map(
            ([key, subcategory]) => `
              <option value="${key}">
                ${subcategory.name}
              </option>
            `
          )
          .join("");
    }

        course?.id || null;

      $("#courseModalTitle").textContent =
        editingId
          ? "แก้ไขรายวิชา"
          : "เพิ่มรายวิชา";

      $("#formCode").value =
        course?.code || "";

      $("#formName").value =
        course?.name || "";

      $("#formCredits").value =
        course?.credits || 3;

      $("#formGrade").value =
        course?.grade || "A";

      $("#formYear").value =
        course?.year || 1;

      $("#formSemester").value =
        course?.semester || "1";

      $("#formCategory").value =
        course?.category || "genEd";

      $("#formRepeated").checked =
        Boolean(course?.repeated);

      updateSubcategories();

      if (
        !$("#subcategoryWrap").hidden
      ) {
        $("#formSubcategory").value =
          course?.subcategory ||

          (
            $("#formCategory").value ===
            "genEd"

              ? "thai"
              : "compulsory"
          );
      }

      $("#courseModal")
        .classList
        .add("open");
    }

    function closeCourseModal() {
      $("#courseModal")
        .classList
        .remove("open");
    }

    /* =========================
       PROFILE FORM
    ========================= */

    function openProfileModal() {
      $("#studentNameInput").value =
        profile.name;

      $("#studentIdInput").value =
        profile.studentId;

      $("#programInput").value =
        profile.program;

      $("#profileModal")
        .classList
        .add("open");
    }

    function closeProfileModal() {
      $("#profileModal")
        .classList
        .remove("open");
    }

    /* =========================
       RENDER
    ========================= */

    function renderAll() {
      renderProfile();
      renderDashboard();
      renderCourses();
      renderTerms();
      renderChecklist();
      renderSettings();
    }

    setupCourseForm();
    renderAll();

    /* =========================
       NAVIGATION EVENTS
    ========================= */

    document
      .querySelectorAll(".nav-btn")
      .forEach(button => {
        button.onclick = () => {
          document
            .querySelectorAll(
              ".nav-btn"
            )
            .forEach(item => {
              item.classList.remove(
                "active"
              );
            });

          button.classList.add(
            "active"
          );

          [
            "dashboardTab",
            "coursesTab",
            "termsTab",
            "checklistTab",
            "settingsTab"
          ].forEach(id => {
            document
              .getElementById(id)
              .hidden =
              id !== button.dataset.tab;
          });

          window.scrollTo({
            top: 0,
            behavior: "smooth"
          });
        };
      });

    /* =========================
       MODAL EVENTS
    ========================= */

    $("#quickEditProfile").onclick =
      openProfileModal;

    $("#formCategory").onchange =
      updateSubcategories;

    $("#closeCourseModal").onclick =
      closeCourseModal;

    $("#cancelCourseModal").onclick =
      closeCourseModal;

    $("#closeProfileModal").onclick =
      closeProfileModal;

    $("#cancelProfileModal").onclick =
      closeProfileModal;

    $("#courseModal").onclick =
      event => {
        if (
          event.target ===
          $("#courseModal")
        ) {
          closeCourseModal();
        }
      };

    $("#profileModal").onclick =
      event => {
        if (
          event.target ===
          $("#profileModal")
        ) {
          closeProfileModal();
        }
      };

    /* =========================
       SAVE COURSE
    ========================= */

    $("#courseForm").onsubmit =
      event => {
        event.preventDefault();

        const course = {
          id:
            editingId ||
            String(Date.now()),

          code:
            $("#formCode")
              .value
              .trim()
              .toUpperCase(),

          name:
            $("#formName")
              .value
              .trim(),

          credits:
            Number(
              $("#formCredits").value
            ),

          grade:
            $("#formGrade").value,

          year:
            Number(
              $("#formYear").value
            ),

          semester:
            $("#formSemester").value,

          category:
            $("#formCategory").value,

          subcategory:
            $("#subcategoryWrap").hidden
              ? ""
              : $("#formSubcategory")
                .value,

          repeated:
            $("#formRepeated").checked
        };

        if (
          !course.code ||
          !course.name
        ) {
          return;
        }

        if (editingId) {
          courses =
            courses.map(item => {
              return (
                item.id === editingId
                  ? course
                  : item
              );
            });
        }

        else {
          courses.push(course);
        }

        saveData();
        closeCourseModal();
        renderAll();
      };

    /* =========================
       SAVE PROFILE
    ========================= */

    $("#profileForm").onsubmit =
      event => {
        event.preventDefault();

        profile = {
          name:
            $("#studentNameInput")
              .value
              .trim(),

          studentId:
            $("#studentIdInput")
              .value
              .trim(),

          program:
            $("#programInput")
              .value
              .trim()
        };

        saveData();
        closeProfileModal();
        renderAll();
      };
  </script>
</body>
</html>
