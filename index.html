<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GradTrack" />
  <title>GradTrack — Supaporn Kriangkraiwanich</title>

  <style>
    :root{
      --country-blue:#40669f;
      --country-cream:#f4efe9;
      --country-red:#921100;
      --dark:#333333;
      --gray:#666666;
      --light-gray:#cccccc;
      --background:#f5f5f5;
      --surface:#ffffff;
      --black:#0b0b0b;
      --border:#e5e5e5;
      --success:#247a4a;
      --warning:#ad6b00;
      --danger:#a52016;

      --radius-card:16px;
      --radius-control:10px;
      --shadow-card:0 6px 14px rgba(0,0,0,.14);

      --s1:4px;
      --s2:8px;
      --s3:12px;
      --s4:16px;
      --s5:20px;
      --s6:24px;
      --s8:32px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-width:320px;
      min-height:100vh;
      color:var(--dark);
      background:#d8d8d8;
      font-family:Arial,"Noto Sans Thai",Tahoma,sans-serif;
    }
    button,input,select{font:inherit}
    button{cursor:pointer}
    [hidden]{display:none!important}

    .app{
      width:min(100%,460px);
      min-height:100vh;
      margin:auto;
      background:var(--background);
      position:relative;
      overflow:hidden;
      box-shadow:0 0 46px rgba(0,0,0,.2);
    }

    .masthead{
      background:var(--black);
      color:white;
      padding:22px 20px 18px;
      display:flex;
      align-items:center;
      gap:14px;
      border-bottom:4px solid var(--country-blue);
    }

    .weather-mark{
      width:42px;
      height:32px;
      position:relative;
      flex:none;
    }
    .weather-mark .sun{
      width:19px;height:19px;border-radius:50%;
      background:#f2bd19;position:absolute;left:8px;top:0;
    }
    .weather-mark .cloud-a,.weather-mark .cloud-b{
      position:absolute;bottom:0;background:#fff;border-radius:20px;
    }
    .weather-mark .cloud-a{width:38px;height:14px;left:0}
    .weather-mark .cloud-b{width:21px;height:21px;left:4px}

    .masthead h1{
      margin:0;
      font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:27px;
      letter-spacing:1px;
      line-height:1;
    }
    .masthead p{
      margin:6px 0 0;
      color:#f2bd19;
      font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:12px;
      font-weight:700;
      letter-spacing:.8px;
    }

    .profile{
      background:var(--surface);
      padding:14px 18px;
      display:flex;
      gap:12px;
      align-items:center;
      border-bottom:1px solid var(--border);
    }
    .avatar{
      width:42px;height:42px;border-radius:50%;
      display:grid;place-items:center;
      background:var(--country-blue);color:white;
      font-size:18px;font-weight:800;flex:none;
    }
    .profile-copy{flex:1;min-width:0}
    .profile-copy strong{
      display:block;font-size:14px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .profile-copy span{
      display:block;margin-top:3px;
      color:var(--gray);font-size:11px;
    }
    .profile-status{
      border:0;border-radius:999px;
      background:var(--black);color:#fff;
      padding:7px 10px;font-size:10px;font-weight:800;
    }

    main{
      min-height:calc(100vh - 146px);
      padding:20px 16px 112px;
    }
    .tab{display:grid;gap:16px}

    .kicker{
      margin:0;
      font-family:"Comic Sans MS","Segoe Print",cursive;
      color:var(--country-red);
      font-size:11px;font-weight:800;letter-spacing:.8px;
    }
    h2{
      margin:4px 0 14px;
      color:var(--black);
      font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:24px;line-height:1.1;
    }
    h3{margin:0;color:var(--black)}

    .card{
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius-card);
      padding:18px;
      box-shadow:var(--shadow-card);
    }
    .card.dark{
      background:var(--black);color:white;border-color:#222;
    }
    .card.dark h2{color:white}
    .card.dark .kicker{color:#f2bd19}

    .hero-card{
      display:flex;justify-content:space-between;
      align-items:flex-start;gap:16px;
    }
    .gpa{
      margin-top:4px;
      font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:56px;font-weight:800;line-height:1;
    }
    .hero-note{
      margin:8px 0 0;color:#d0d0d0;
      font-size:11px;line-height:1.5;
    }
    .hero-icon{font-size:43px}

    .metrics{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .metric{
      min-height:136px;
      display:flex;flex-direction:column;justify-content:space-between;
    }
    .metric span{font-size:11px;color:var(--gray)}
    .metric strong{
      font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:40px;color:var(--black);
    }
    .metric small{font-size:10px;color:var(--gray)}
    .metric.red{background:var(--country-red);border-color:#711000}
    .metric.red span,.metric.red strong,.metric.red small{color:white}

    .card-head{
      display:flex;align-items:flex-start;
      justify-content:space-between;gap:12px;
    }
    .big-label{
      font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:27px;font-weight:800;color:var(--country-blue);
    }

    .progress{
      height:10px;
      background:#ececec;border:1px solid #d4d4d4;
      border-radius:999px;overflow:hidden;
    }
    .progress span{
      display:block;height:100%;width:0;
      background:var(--country-blue);
      border-radius:inherit;transition:width .25s ease;
    }
    .progress.red span{background:var(--country-red)}
    .progress.gold span{background:#d0a522}
    .progress.green span{background:var(--success)}

    .curriculum-list{display:grid;gap:15px}
    .curriculum-row{display:grid;gap:7px}
    .curriculum-label{
      display:flex;justify-content:space-between;
      gap:12px;font-size:11px;
    }

    .checklist{display:grid;gap:9px}
    .check-item{
      display:flex;align-items:center;gap:10px;
      padding:11px;border-radius:10px;
      background:#efefef;border:1px solid #ddd;
      font-size:11px;
    }
    .check-icon{
      width:24px;height:24px;flex:none;
      display:grid;place-items:center;border-radius:50%;
      background:#ccc;color:white;font-weight:900;
    }
    .check-item.done{background:#e4f2e9;border-color:#bdddc8}
    .check-item.done .check-icon{background:var(--success)}
    .check-copy{flex:1}
    .check-copy strong{display:block;color:var(--black)}
    .check-copy small{display:block;margin-top:3px;color:var(--gray)}

    .status-box{
      border-radius:12px;padding:14px;
      display:flex;align-items:flex-start;gap:12px;
      background:#eef2f8;border:1px solid #c9d6e8;
    }
    .status-box.warning{background:#fff2da;border-color:#efd19a}
    .status-box.danger{background:#fbe4e1;border-color:#edb8b1}
    .status-symbol{font-size:28px}
    .status-copy strong{
      display:block;font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:19px;color:var(--black);
    }
    .status-copy p{margin:5px 0 0;font-size:11px;line-height:1.5;color:var(--gray)}

    .honor-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
    }
    .honor-card{
      border:1px solid #ddd;border-radius:12px;
      padding:13px;background:#f1f1f1;
    }
    .honor-card.eligible{background:#fff4cc;border-color:#e4c25e}
    .honor-card strong{
      display:block;font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:15px;color:var(--black);
    }
    .honor-card span{display:block;margin-top:5px;font-size:10px;color:var(--gray)}

    .trend-wrap{
      display:grid;
      grid-template-columns:95px 1fr;
      gap:14px;align-items:center;
    }
    .trend-badge{
      height:95px;border-radius:14px;
      display:grid;place-items:center;text-align:center;
      background:var(--black);color:#fff;
      font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:14px;font-weight:800;
    }
    .trend-copy h3{
      font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:18px;
    }
    .trend-copy p{margin:6px 0 0;font-size:11px;line-height:1.5;color:var(--gray)}

    .filter-grid,.form-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
    }
    label{display:grid;gap:6px;font-size:11px;font-weight:700}
    input,select{
      width:100%;padding:11px 12px;
      color:var(--black);background:#f0f0f0;
      border:1px solid #d6d6d6;border-radius:var(--radius-control);
      outline:none;
    }
    input:focus,select:focus{
      border-color:var(--country-blue);
      box-shadow:0 0 0 3px rgba(64,102,159,.14);
    }

    .btn{
      border:0;border-radius:9px;
      padding:12px 14px;font-weight:800;
      transition:.2s ease;
    }
    .btn.primary{background:var(--country-blue);color:white}
    .btn.secondary{background:#e5e5e5;color:var(--black)}
    .btn.danger{background:var(--country-red);color:white}
    .btn.full{width:100%}

    .course-list{display:grid;gap:12px}
    .course{
      display:flex;gap:11px;align-items:center;
      padding:12px;background:white;
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow:0 4px 10px rgba(0,0,0,.10);
    }
    .grade{
      width:42px;height:54px;flex:none;
      display:grid;place-items:center;
      border-radius:9px;background:var(--black);color:white;
      font-family:"Comic Sans MS","Segoe Print",cursive;
      font-size:20px;font-weight:800;
    }
    .course-info{flex:1;min-width:0}
    .course-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px}
    .course-code{
      padding:3px 7px;border-radius:6px;
      background:#dce7f6;color:#2e568a;
      font-size:10px;font-weight:800;
    }
    .course-term{font-size:10px;color:var(--gray)}
    .course h3{
      font-size:13px;white-space:nowrap;
      overflow:hidden;text-overflow:ellipsis;
    }
    .course p{margin:5px 0 0;color:var(--gray);font-size:10px}
    .actions{display:grid;gap:5px}
    .icon-btn{
      width:31px;height:31px;
      border:0;border-radius:50%;
      display:grid;place-items:center;
      background:#ededed;color:var(--black);
    }
    .icon-btn.delete:hover{background:#f6d8d2;color:var(--country-red)}

    .term-summary{display:grid;gap:10px}
    .term-item{
      display:grid;grid-template-columns:1fr auto;
      gap:4px;padding:11px;border-radius:9px;
      background:#ededed;font-size:11px;
    }
    .term-item small{grid-column:1/-1;color:var(--gray)}

    .chart{
      height:220px;padding:18px 8px 0;
      display:flex;align-items:flex-end;gap:6px;
      border-left:1px solid #aaa;border-bottom:1px solid #aaa;
      overflow-x:auto;
    }
    .bar-col{
      height:100%;min-width:25px;flex:1;
      display:flex;flex-direction:column;
      align-items:center;justify-content:flex-end;gap:5px;
    }
    .bar-col span,.bar-col small{font-size:8px}
    .bar{
      width:100%;min-height:5px;
      background:var(--country-blue);
      border-radius:5px 5px 0 0;
    }

    .settings-stack{display:grid;gap:10px}
    .helper{margin:0;color:var(--gray);font-size:10px;line-height:1.5}
    .divider{height:1px;background:var(--border);margin:4px 0}

    .bottom-nav{
      position:fixed;left:50%;bottom:0;transform:translateX(-50%);
      width:min(100%,460px);
      display:grid;grid-template-columns:repeat(5,1fr);
      padding:9px 8px 14px;
      background:var(--black);border-top:3px solid var(--country-blue);
      z-index:20;
    }
    .nav-btn{
      border:0;background:transparent;color:#8b8b8b;
      display:grid;justify-items:center;gap:4px;font-size:9px;
    }
    .nav-icon{
      width:34px;height:34px;border-radius:50%;
      display:grid;place-items:center;font-size:15px;
    }
    .nav-btn.active{color:#fff}
    .nav-btn.active .nav-icon{background:var(--country-blue)}

    .modal-backdrop{
      position:fixed;inset:0;z-index:50;
      display:none;align-items:flex-end;justify-content:center;
      padding:14px;background:rgba(0,0,0,.68);
    }
    .modal-backdrop.open{display:flex}
    .modal{
      width:min(100%,430px);max-height:92vh;
      overflow:auto;padding:18px;
      display:grid;gap:12px;
      background:#fff;border-radius:18px;
      border-top:5px solid var(--country-blue);
      box-shadow:0 18px 50px rgba(0,0,0,.35);
    }
    .modal-head{
      display:flex;justify-content:space-between;align-items:flex-start;
    }
    .modal-head h2{margin-bottom:0}
    .close{
      width:34px;height:34px;border:0;border-radius:50%;
      background:#ececec;font-size:18px;
    }
    .modal-actions{
      display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px;
    }
    .checkbox-line{
      display:flex;align-items:center;gap:9px;
      font-size:11px;font-weight:700;
    }
    .checkbox-line input{width:auto}

    .empty{
      padding:28px 16px;text-align:center;
      color:var(--gray);background:white;
      border:1px dashed #c8c8c8;border-radius:14px;font-size:12px;
    }

    @media (min-width:461px){
      .app{margin:18px auto;border-radius:26px;min-height:900px}
      .bottom-nav{bottom:18px;border-radius:0 0 26px 26px}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="masthead">
      <div class="weather-mark" aria-hidden="true">
        <span class="sun"></span>
        <span class="cloud-a"></span>
        <span class="cloud-b"></span>
      </div>
      <div>
        <h1>GRADTRACK</h1>
        <p>STUDY GUIDE</p>
      </div>
    </header>

    <section class="profile">
      <div id="avatar" class="avatar">S</div>
      <div class="profile-copy">
        <strong id="profileName">Supaporn Kriangkraiwanich</strong>
        <span id="profileId">660110243 · Digital Design & Technology</span>
      </div>
      <button id="quickEditProfile" class="profile-status">แก้ไข</button>
    </section>

    <main>
      <section id="dashboardTab" class="tab"></section>
      <section id="coursesTab" class="tab" hidden></section>
      <section id="termsTab" class="tab" hidden></section>
      <section id="checklistTab" class="tab" hidden></section>
      <section id="settingsTab" class="tab" hidden></section>
    </main>

    <nav class="bottom-nav" aria-label="เมนูหลัก">
      <button class="nav-btn active" data-tab="dashboardTab"><span class="nav-icon">⌂</span><span>ภาพรวม</span></button>
      <button class="nav-btn" data-tab="coursesTab"><span class="nav-icon">▤</span><span>รายวิชา</span></button>
      <button class="nav-btn" data-tab="termsTab"><span class="nav-icon">▥</span><span>รายเทอม</span></button>
      <button class="nav-btn" data-tab="checklistTab"><span class="nav-icon">✓</span><span>เช็กลิสต์</span></button>
      <button class="nav-btn" data-tab="settingsTab"><span class="nav-icon">⚙</span><span>ตั้งค่า</span></button>
    </nav>
  </div>

  <div id="courseModal" class="modal-backdrop">
    <form id="courseForm" class="modal">
      <div class="modal-head">
        <div>
          <p class="kicker">COURSE FORM</p>
          <h2 id="courseModalTitle">เพิ่มรายวิชา</h2>
        </div>
        <button class="close" id="closeCourseModal" type="button">×</button>
      </div>

      <label>รหัสวิชา<input id="formCode" required /></label>
      <label>ชื่อวิชา<input id="formName" required /></label>

      <div class="form-grid">
        <label>หน่วยกิต
          <select id="formCredits">
            <option value="1">1</option><option value="2">2</option>
            <option value="3" selected>3</option><option value="4">4</option>
            <option value="6">6</option>
          </select>
        </label>
        <label>เกรด<select id="formGrade"></select></label>
      </div>

      <div class="form-grid">
        <label>ชั้นปี<select id="formYear"></select></label>
        <label>ภาคเรียน
          <select id="formSemester">
            <option value="1">เทอม 1</option>
            <option value="2">เทอม 2</option>
            <option value="3">เทอม 3</option>
          </select>
        </label>
      </div>

      <label>หมวดวิชา<select id="formCategory"></select></label>
      <label id="subcategoryWrap">กลุ่มวิชาย่อย<select id="formSubcategory"></select></label>

      <label class="checkbox-line">
        <input id="formRepeated" type="checkbox" />
        รายวิชานี้เป็นการลงทะเบียนเรียนซ้ำ
      </label>

      <div class="modal-actions">
        <button id="cancelCourseModal" class="btn secondary" type="button">ยกเลิก</button>
        <button class="btn primary" type="submit">บันทึก</button>
      </div>
    </form>
  </div>

  <div id="profileModal" class="modal-backdrop">
    <form id="profileForm" class="modal">
      <div class="modal-head">
        <div>
          <p class="kicker">STUDENT PROFILE</p>
          <h2>แก้ไขข้อมูลนักศึกษา</h2>
        </div>
        <button class="close" id="closeProfileModal" type="button">×</button>
      </div>

      <label>ชื่อ–นามสกุล<input id="studentNameInput" required /></label>
      <label>รหัสนักศึกษา<input id="studentIdInput" required /></label>
      <label>ชื่อหลักสูตร<input id="programInput" required /></label>

      <div class="modal-actions">
        <button id="cancelProfileModal" class="btn secondary" type="button">ยกเลิก</button>
        <button class="btn primary" type="submit">บันทึก</button>
      </div>
    </form>
  </div>

  <script>
    const DEFAULT_SETTINGS = {
      totalCredits:133,
      honor1Gpa:3.75,
      honor2Gpa:3.25,
      normalMinGpa:2.00,
      probationMinGpa:1.50,
      requireNoFForHonors:true,
      requireNoRepeatForHonors:true
    };

    const CURRICULUM = {
      genEd:{
        name:"หมวดศึกษาทั่วไป",required:33,
        subcategories:{
          thai:{name:"ภาษาไทย",required:3},
          foreign:{name:"ภาษาต่างประเทศ",required:6},
          science:{name:"วิทยาศาสตร์",required:3},
          math:{name:"คณิตศาสตร์",required:3},
          social:{name:"สังคมศาสตร์",required:3},
          humanities:{name:"มนุษยศาสตร์",required:3},
          otherGenEd:{name:"ศึกษาทั่วไปอื่น ๆ",required:12}
        }
      },
      core:{name:"กลุ่มวิชาแกน",required:27},
      specific:{
        name:"กลุ่มวิชาเฉพาะ",required:67,
        subcategories:{
          compulsory:{name:"วิชาชีพบังคับ",required:52},
          elective:{name:"วิชาชีพเลือก",required:15}
        }
      },
      freeElective:{name:"หมวดเลือกเสรี",required:6}
    };

    const INITIAL_PROFILE = {
      name:"Supaporn Kriangkraiwanich",
      studentId:"660110243",
      program:"Digital Design & Technology"
    };

    const INITIAL_COURSES = [
      {id:"1",code:"DDT101",name:"Introduction to Digital Design",credits:3,grade:"A",category:"core",subcategory:"",year:1,semester:"1",repeated:false},
      {id:"2",code:"DDT102",name:"Computer Programming for Designers",credits:3,grade:"B+",category:"specific",subcategory:"compulsory",year:1,semester:"1",repeated:false},
      {id:"3",code:"THAI101",name:"Thai Language Skills",credits:3,grade:"A",category:"genEd",subcategory:"thai",year:1,semester:"1",repeated:false},
      {id:"4",code:"ENG101",name:"English Listening and Speaking",credits:3,grade:"B",category:"genEd",subcategory:"foreign",year:1,semester:"1",repeated:false},
      {id:"5",code:"SCI101",name:"Science and Technology Today",credits:3,grade:"A",category:"genEd",subcategory:"science",year:1,semester:"2",repeated:false},
      {id:"6",code:"DDT103",name:"Drawing and Visual Communication",credits:3,grade:"A",category:"core",subcategory:"",year:1,semester:"2",repeated:false},
      {id:"7",code:"MATH101",name:"Mathematics in Daily Life",credits:3,grade:"C+",category:"genEd",subcategory:"math",year:1,semester:"2",repeated:false},

    ];

    const GRADE_VALUES = {
      A:4,"B+":3.5,B:3,"C+":2.5,C:2,"D+":1.5,D:1,F:0,W:null,I:null
    };

    let profile = load("gradtrack_profile",INITIAL_PROFILE);

    function clone(data){return JSON.parse(JSON.stringify(data))}
    function load(key,fallback){
      try{
        const saved=localStorage.getItem(key);
        return saved?JSON.parse(saved):clone(fallback);
      }catch{return clone(fallback)}
    }
    function save(){
      localStorage.setItem("gradtrack_profile",JSON.stringify(profile));
      localStorage.setItem("gradtrack_settings",JSON.stringify(settings));
      localStorage.setItem("gradtrack_courses_v2",JSON.stringify(courses));
    }

    function passed(course){return !["F","W","I"].includes(course.grade)}
    function gradeCounts(course){return GRADE_VALUES[course.grade]!==null}

    function calculate(){
      let earned=0,points=0,gpaCredits=0,hasF=false,hasRepeat=false;
      const categoryCredits={
        genEd:{total:0,thai:0,foreign:0,science:0,math:0,social:0,humanities:0,otherGenEd:0},
        core:0,
        specific:{total:0,compulsory:0,elective:0},
        freeElective:0
      };

      courses.forEach(course=>{
        const gv=GRADE_VALUES[course.grade];
        if(course.grade==="F") hasF=true;
        if(course.repeated) hasRepeat=true;

        if(gv!==null){
          points+=gv*course.credits;
          gpaCredits+=course.credits;
        }

        if(!passed(course)) return;
        earned+=course.credits;

        if(course.category==="genEd"){
          categoryCredits.genEd.total+=course.credits;
          const sub=course.subcategory||"otherGenEd";
          categoryCredits.genEd[sub]=(categoryCredits.genEd[sub]||0)+course.credits;
        }else if(course.category==="specific"){
          categoryCredits.specific.total+=course.credits;
          const sub=course.subcategory||"compulsory";
          categoryCredits.specific[sub]=(categoryCredits.specific[sub]||0)+course.credits;
        }else{
          categoryCredits[course.category]+=course.credits;
        }
      });

      const gpa=gpaCredits?points/gpaCredits:0;
      const status = gpa>=settings.normalMinGpa
        ? {label:"สถานภาพปกติ",tone:"normal",icon:"✓",detail:`GPA รวม ${gpa.toFixed(2)} อยู่ในเกณฑ์ปกติ`}
        : gpa>=settings.probationMinGpa
          ? {label:"วิทยาทัณฑ์ (Probation)",tone:"warning",icon:"!",detail:`GPA รวม ${gpa.toFixed(2)} ต่ำกว่า ${settings.normalMinGpa.toFixed(2)}`}
          : {label:"พ้นสภาพ",tone:"danger",icon:"×",detail:`GPA รวม ${gpa.toFixed(2)} ต่ำกว่า ${settings.probationMinGpa.toFixed(2)}`};

      const allComplete = Object.entries(CURRICULUM).every(([key,cat])=>{
        const amount=key==="genEd"||key==="specific"?categoryCredits[key].total:categoryCredits[key];
        return amount>=cat.required;
      });

      const baseHonorEligible =
        earned>=settings.totalCredits &&
        (!settings.requireNoFForHonors || !hasF) &&
        (!settings.requireNoRepeatForHonors || !hasRepeat);

      const honor1=baseHonorEligible && gpa>=settings.honor1Gpa;
      const honor2=baseHonorEligible && gpa>=settings.honor2Gpa && gpa<settings.honor1Gpa;

      return {
        earned,remaining:Math.max(0,settings.totalCredits-earned),
        progress:(earned/settings.totalCredits)*100,
        gpa,categoryCredits,hasF,hasRepeat,status,
        allComplete,honor1,honor2,baseHonorEligible
      };
    }

    function termStats(){
      const rows=[];
      for(let year=1;year<=4;year++){
        for(let semester=1;semester<=3;semester++){
          const list=courses.filter(c=>c.year===year&&String(c.semester)===String(semester));
          let points=0,credits=0,earned=0;
          list.forEach(c=>{
            const gv=GRADE_VALUES[c.grade];
            if(gv!==null){points+=gv*c.credits;credits+=c.credits}
            if(passed(c)) earned+=c.credits;
          });
          rows.push({
            year,semester,
            courseCount:list.length,
            earned,
            gpa:credits?points/credits:0
          });
        }
      }
      return rows;
    }

    function trend(){
      const active=termStats().filter(t=>t.courseCount>0);
      if(active.length<2){
        return {label:"ข้อมูลยังไม่พอ",icon:"—",detail:"เพิ่มผลการเรียนอย่างน้อย 2 เทอมเพื่อดูแนวโน้ม"};
      }
      const last=active[active.length-1];
      const prev=active[active.length-2];
      const diff=last.gpa-prev.gpa;
      if(diff>0.15)return {label:"แนวโน้มดีขึ้น",icon:"↗",detail:`GPA เทอมล่าสุดเพิ่มขึ้น ${diff.toFixed(2)} จากเทอมก่อน`};
      if(diff<-0.15)return {label:"ควรเฝ้าระวัง",icon:"↘",detail:`GPA เทอมล่าสุดลดลง ${Math.abs(diff).toFixed(2)} จากเทอมก่อน`};
      return {label:"แนวโน้มคงที่",icon:"→",detail:"GPA เทอมล่าสุดใกล้เคียงกับเทอมก่อน"};
    }

      updateSubcategories();
      if(!$("#subcategoryWrap").hidden){
        $("#formSubcategory").value=course?.subcategory||($("#formCategory").value==="genEd"?"thai":"compulsory");
      }
      $("#courseModal").classList.add("open");
    }

    function closeCourseModal(){$("#courseModal").classList.remove("open")}

    function openProfileModal(){
      $("#studentNameInput").value=profile.name;
      $("#studentIdInput").value=profile.studentId;
      $("#programInput").value=profile.program;
      $("#profileModal").classList.add("open");
    }

    function closeProfileModal(){$("#profileModal").classList.remove("open")}

    function renderAll(){
      renderProfile();
      renderDashboard();
      renderCourses();
      renderTerms();
      renderChecklist();
      renderSettings();
    }

    setupCourseForm();
    renderAll();

    document.querySelectorAll(".nav-btn").forEach(btn=>{
      btn.onclick=()=>{
        document.querySelectorAll(".nav-btn").forEach(x=>x.classList.remove("active"));
        btn.classList.add("active");
        ["dashboardTab","coursesTab","termsTab","checklistTab","settingsTab"].forEach(id=>{
          document.getElementById(id).hidden=id!==btn.dataset.tab;
        });
        window.scrollTo({top:0,behavior:"smooth"});
      };
    });

    $("#quickEditProfile").onclick=openProfileModal;
    $("#formCategory").onchange=updateSubcategories;
    $("#closeCourseModal").onclick=closeCourseModal;
    $("#cancelCourseModal").onclick=closeCourseModal;
    $("#closeProfileModal").onclick=closeProfileModal;
    $("#cancelProfileModal").onclick=closeProfileModal;

    $("#courseModal").onclick=e=>{if(e.target===$("#courseModal"))closeCourseModal()};
    $("#profileModal").onclick=e=>{if(e.target===$("#profileModal"))closeProfileModal()};

    $("#courseForm").onsubmit=e=>{
      e.preventDefault();
      const course={
        id:editingId||String(Date.now()),
        code:$("#formCode").value.trim().toUpperCase(),
        name:$("#formName").value.trim(),
        credits:Number($("#formCredits").value),
        grade:$("#formGrade").value,
        year:Number($("#formYear").value),
        semester:$("#formSemester").value,
        category:$("#formCategory").value,
        subcategory:$("#subcategoryWrap").hidden?"":$("#formSubcategory").value,
        repeated:$("#formRepeated").checked
      };
      if(!course.code||!course.name)return;
      if(editingId)courses=courses.map(c=>c.id===editingId?course:c);
      else courses.push(course);
      save();closeCourseModal();renderAll();
    };

    $("#profileForm").onsubmit=e=>{
      e.preventDefault();
      profile={
        name:$("#studentNameInput").value.trim(),
        studentId:$("#studentIdInput").value.trim(),
        program:$("#programInput").value.trim()
      };
      save();closeProfileModal();renderAll();
    };
  </script>
</body>
</html>
